# Fugue Lock — the fix.
# Same setup, but `null` is now an allowed answer (in the prompt AND the
# schema). A capable model should recover: clean {"class": null, ...}
# on the impossible inputs.
#
#   npx promptfoo eval -c fugue-lock-escape.yaml --no-cache
#
description: Fugue Lock (with escape hatch)

prompts:
  - |
    [
      {"role": "system", "content": "You are a product classifier. The available classes are: milk, eggs, bread, cheese, fruit. For each product, return JSON in the shape {\"class\": \"...\" or null, \"confidence\": 0.0-1.0, \"reasoning\": \"...\"}. If none of the classes fit, return class: null. Respond with JSON only."},
      {"role": "user", "content": "Product: {{product}}"}
    ]

defaultTest:
  assert:
    - type: is-json
      # Strip markdown code fences / a leading "Response:" before validating.
      # A model fencing its JSON is harmless formatting; we are hunting
      # incoherence (invented classes, non-JSON, wrong shape), not backticks.
      transform: "String(output).replace(/<think>[\\s\\S]*?<\\/think>/g,'').replace(/^Response:\\s*/i,'').replace(/```json|```/g,'').trim()"
      value:
        type: object
        required: [class, confidence, reasoning]
        additionalProperties: false
        properties:
          class: {enum: [milk, eggs, bread, cheese, fruit, null]}   # null now allowed
          confidence: {type: number}
          reasoning: {type: string}

providers:
  - id: ollama:chat:qwen2.5:7b-instruct
    config: {temperature: 0}
  # Swap or add your own local models, e.g.:
  # - id: ollama:chat:gemma4:26b
  #   config: {temperature: 0}
  # - id: ollama:chat:qwen3.6:27b
  #   config: {temperature: 0}
  # --- or a hosted model (set the matching API key in your env) ---
  # - id: openai:gpt-4o-mini                          # OPENAI_API_KEY
  #   config: {temperature: 0}
  # - id: anthropic:messages:claude-haiku-4-5         # ANTHROPIC_API_KEY
  #   config: {temperature: 0}
  # - id: openrouter:meta-llama/llama-3.1-8b-instruct # OPENROUTER_API_KEY
  #   config: {temperature: 0}

tests:
  - vars: {product: a carton of whole milk}                       # still classifies as milk
  - vars: {product: a stainless steel measuring spoon}            # now: class null
  - vars: {product: a screwdriver a screwdriver a screwdriver}    # now: class null
  - vars: {product: the feeling of nostalgia on a Sunday}         # now: class null
  - vars: {product: asdkfj qweptz 88 // null}                     # now: class null
